name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:
  # Rebuild twice a day so new clubs/events get pre-rendered into static HTML
  # and added to the sitemap without needing a code push (UTC times = 06:00 and 18:00 IST)
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  # Allow the backend/API to trigger an immediate rebuild when content changes:
  # curl -X POST https://api.github.com/repos/<owner>/<repo>/dispatches \
  #   -H "Authorization: Bearer <token>" -d '{"event_type":"content-update"}'
  repository_dispatch:
    types: [content-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
