  <script>
    // GitHub Pages SPA routing: store the intended path then silently swap
    // the URL back to / so the React app bootstraps, then restores the path
    // via history.replaceState in index.html — avoids a detectable JS redirect.
    var dest = window.location.pathname + window.location.search + window.location.hash;
    sessionStorage.setItem('spa-redirect', dest);
    // Replace the visible URL with root so the browser fetches index.html assets,
    // but don't trigger a navigation so crawlers don't see a redirect chain.
    history.replaceState(null, '', '/');
    window.location.replace('/');
  </script>
